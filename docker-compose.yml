version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: employee_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  ai_trellis_3d:
    build: ./ai/trellis_3d
    container_name: aerotwin_ai_3d
    ports:
      - "8001:8001"
    volumes:
      - ./frontend/public/storage/glb:/app/storage/glb
    restart: unless-stopped

volumes:
  mysql_data:
